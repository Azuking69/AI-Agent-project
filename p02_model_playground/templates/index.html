<!DOCTYPE html>
<html lang="en">
    <header>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Model Playground</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </header>
    <body>
        <div class="container">
            <h1>Model Playground</h1>
            <p class="subtitle">
                Keep the same question and compare the response differences by changing only one setting at a time
            </p>

            <!-- Model Selection -->
            <div class="setting">
                <div class="setting-group">
                    <label for="model-select">Model: </label>
                    <select id="model-select">
                        {% for key, model in models.items() %}
                        <!-- 標準：sonnet -->
                        <option value="{{ key }}" {{'selected' if key == 'sonnet'}}>
                            {{ model.name }} - {{ model.description }}
                        </option>
                        {% endfor %}
                    </select>
                </div>


                <!-- Settings Temperature -->
                <div class="setting-row">
                    <div class="setting-group">
                        <label for="temperature">Temperature: </label>
                        <input type="range" id="temperature" min="0" max="1" step="0.1" value="1.0">
                        <div class="range-labels">
                            <span>More consistent</span><span>...More creative</span>
                        </div>
                    </div>

                    <!-- Settings Max Tokens -->
                    <div class="setting-group">
                        <label for="max-tokens">Max Tokens: <span id="tokens-value">1024</span></label>
                        <input type="range" id="max-tokens" min="64" max="4096" step="64" value="1024">
                        <div class="range-labels">
                            <span>Shorter</span><span>Longer</span>
                        </div>
                </div>
            </div> 

            <!-- Chat Box -->
            <div class="chat-box" id="chat-box"></div>

            <!-- User Input Area -->
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ex: What is the capital of France?">
                <button id="send-btn">Send</button>
                <button id="reset-btn">Reset</button>
            </div>
        </div>

        <script>
            // Get references to the DOM elements
            const chatBox = document.getElementById('chat-box');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const resetBtn = document.getElementById('reset-btn');
            const modelSelect = document.getElementById('model-select');
            const temperatureInput = document.getElementById('temperature');
            const tempValue = document.getElementById('temperature-value');
            const maxTokensInput = document.getElementById('max-tokens');
            const tokensValue = document.getElementById('tokens-value');

            const sessionId = crypto.randomUUID(); // Generate a unique session ID'
            let isStreaming = false; // ストリーミング追跡フラグ

            // Function to send user input to the server
            tempSlider.oninput = () => tempValue.textContent = temperatureInput.value;
            tokensSlider.oninput = () => tokensValue.textContent = maxTokensInput.value;

            // messageを追加
            function addMessage(role, text){
                const div = document.createElement('div');
                div.className = `message ${role}`;
                div.textContent = text;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight; // Scroll to the bottom
                return div;
            }

            // statusを追加
            function addStatus(inputTokens, outPutTokens, elapsed){
                const div = document.createElement('div');
                div.className = 'status';
                div.textContent = `This call/full generation time: ${elapsed} seconds, input tokens: ${inputTokens}, output tokens: ${outPutTokens}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            // メッセージを送信
            async function sendMessage() {
                const message = userInput.value.trim();
                if (!message) return;

                addMessage('user', message);
                const assistantDiv = addMessage('assistant', '...'); // Placeholder for streaming response

                // fetch APIを使用してサーバーにPOSTリクエストを送信
                // fetch：HTTPリクエストを送信するためのブラウザAPI
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        model: modelSelect.value, 
                        message: message,
                        // parseFloat：文字列を浮動小数点数に変換、
                        // parseInt：文字列を整数に変換
                        temperature: parseFloat(temperatureInput.value),
                        max_tokens: parseInt(maxTokensInput.value),
                        session_id: sessionId,
                    })
                });

                // response.body.getReader()：レスポンスのボディをストリームとして読み取るためのリーダーを取得
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while(true){
                    const{done, value} = await reader.read();
                    if(done) break;

                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\n');
                    // 最後の行は不完全な可能性あり、最後の行をバッファに保持
                    buffer = lines.pop(); 

                    // 各行を処理
                    for(const line of lines){
                        if(!line.startsWith('data: ')) continue;
                            // 'data: 'を削除してJSONを解析
                            const data = JSON.parse(line.slice(6)).data; 

                            // doneがtrueの場合はステータスを追加
                            if(data.done) {
                                addStatus(data.input_tokens, data.output_tokens, data.elapsed);
                            // falseの場合はassistantDivにテキストを追加
                            }else{
                                assistantDiv.textContent += data.textt;
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        }
                    }

                    isStreaming = false; // ストリーミング終了
                    sendBtn.disabled = false; // 送信ボタンを有効化
                    userInput.focus(); // フォーカスを戻す
            }

            // リセット処理
            async function resetChat() {
                await fetch('/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        model: modelSelect.value,
                        session_id: sessionId, 
                    })
                });
                // チャットボックスをクリア
                chatBox.innerHTML = '';
                userInput.value = '';
                userInput.focus();
            }

            // イベントリスナーの設定
            sendBtn.addEventListener('click', sendMessage);
            // keydownイベントを使用してEnterキーで送信、Shift+Enterで改行
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            resetBtn.addEventListener('click', resetChat);
        </script>
    </body>
</html>
